services:
  # PostgreSQL Database
  db:
    profiles: ["prod"]
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example}
      POSTGRES_DB: ${POSTGRES_DB:-stock_battle_royale}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend API
  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PORT: ${PORT:-3000}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-example}@db:5432/${POSTGRES_DB:-stock_battle_royale}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      BOT_EXECUTION_INTERVAL: ${BOT_EXECUTION_INTERVAL:-30000}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && node dist/server.js"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-3000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend Client
  client:
    profiles: ["prod"]
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        PORT: ${CLIENT_PORT:-80}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:${CLIENT_PORT:-80}"
    environment:
      PORT: ${CLIENT_PORT:-80}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  # Demo — single container (frontend + mock backend + scripted WS loop)
  # Activate with: COMPOSE_PROFILES=demo in .env
  demo:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: Dockerfile.demo
    restart: unless-stopped
    ports:
      - "${DEMO_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
